version: "3.9"

services:
  db:
    image: postgres:15
    container_name: failio-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: failio
      POSTGRES_PASSWORD: failio123
      POSTGRES_DB: failio
    ports:
      - "9999:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: