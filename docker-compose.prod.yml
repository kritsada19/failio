version: "3.9"

services:
  app:
    build:
      context: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://dev:dev@db:5432/failure_app
      NEXTAUTH_SECRET: your_super_secret_here
      NEXTAUTH_URL: http://localhost:3000
    depends_on:
      - db
    restart: unless-stopped

  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: failure_app
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: